---
- name: Development environment setup
  hosts: localhost
  connection: local
  vars_files:
    - vars.yml

  tasks:
    # ── System packages ────────────────────────────────────────────────────────

    - name: Install apt packages
      become: true
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        update_cache: true
      when: ansible_pkg_mgr == "apt"
      tags: packages

    - name: Install brew packages
      community.general.homebrew:
        name: "{{ brew_packages }}"
        state: present
      when: ansible_pkg_mgr == "brew"
      tags: packages

    - name: Install pip packages
      ansible.builtin.pip:
        name: "{{ pip_packages }}"
        executable: pip3
        extra_args: --user
      tags: packages

    # ── User tools (GitHub releases) ───────────────────────────────────────────

    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "{{ local_bin }}"
        state: directory
        mode: "0755"
      tags: tools

    - name: Check installed GitHub release tools
      ansible.builtin.stat:
        path: "{{ local_bin }}/{{ item.binary }}"
      loop: "{{ github_releases }}"
      register: gh_tool_stat
      tags: tools

    - name: Create temp dir for GitHub release tools
      ansible.builtin.tempfile:
        state: directory
        prefix: "gh_tool_"
      register: gh_tmpdir
      when: gh_tool_stat.results | selectattr('stat.exists', 'equalto', false) | list | length > 0
      tags: tools

    - name: Download and extract GitHub release tools
      ansible.builtin.unarchive:
        src: "https://github.com/{{ item.item.repo }}/releases/download/{{ item.item.tag_prefix | default('v') }}{{ item.item.version }}/{{ item.item.tarball }}"
        dest: "{{ gh_tmpdir.path | default('/tmp') }}"
        remote_src: true
      loop: "{{ gh_tool_stat.results }}"
      when: not item.stat.exists and gh_tmpdir is not skipped
      tags: tools

    - name: Install GitHub release binaries
      ansible.builtin.shell:
        cmd: "find {{ gh_tmpdir.path | default('/tmp') }} -name {{ item.item.binary }} -type f -exec cp {} {{ local_bin }}/{{ item.item.binary }} \\; && chmod 755 {{ local_bin }}/{{ item.item.binary }}"
      loop: "{{ gh_tool_stat.results }}"
      when: not item.stat.exists and gh_tmpdir is not skipped
      tags: tools

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ gh_tmpdir.path | default(omit) }}"
        state: absent
      when: gh_tmpdir is not skipped
      tags: tools

    # ── Kitty ──────────────────────────────────────────────────────────────────

    - name: Check if kitty is installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/kitty.app/bin/kitty"
      register: kitty_stat
      tags: tools

    - name: Install kitty
      ansible.builtin.shell:
        cmd: "curl -L {{ kitty_install_url }} | sh /dev/stdin launch=n"
      when: not kitty_stat.stat.exists
      tags: tools

    # ── NVM ────────────────────────────────────────────────────────────────────

    - name: Check if nvm is installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
      register: nvm_stat
      tags: tools

    - name: Install nvm
      ansible.builtin.shell:
        cmd: >
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      when: not nvm_stat.stat.exists
      tags: tools

    # ── Dotfile symlinks ───────────────────────────────────────────────────────

    - name: Ensure config directories exist
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/{{ item.dest | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ symlinks }}"
      when: (item.dest | dirname) != ""
      tags: dotfiles

    - name: Symlink dotfiles
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ symlinks }}"
      tags: dotfiles

    - name: Ensure scripts are executable
      ansible.builtin.file:
        path: "{{ dotfiles_dir }}/{{ item.src }}"
        mode: "0755"
      loop: "{{ symlinks }}"
      when: item.dest is match("bin/.*")
      tags: dotfiles
