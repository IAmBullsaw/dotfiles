---
- name: Development environment setup
  hosts: localhost
  connection: local
  vars_files:
    - vars.yml

  tasks:
    # ── System packages ────────────────────────────────────────────────────────

    - name: Install apt packages
      become: true
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
        update_cache: true
      when: ansible_pkg_mgr == "apt"
      tags: packages

    - name: Install brew packages
      community.general.homebrew:
        name: "{{ brew_packages }}"
        state: present
      when: ansible_pkg_mgr == "brew"
      tags: packages

    # ── User tools (GitHub releases) ───────────────────────────────────────────

    - name: Ensure ~/.local/bin exists
      ansible.builtin.file:
        path: "{{ local_bin }}"
        state: directory
        mode: "0755"
      tags: tools

    - name: Check installed GitHub release tools
      ansible.builtin.stat:
        path: "{{ local_bin }}/{{ item.binary }}"
      loop: "{{ github_releases }}"
      register: gh_tool_stat
      tags: tools

    - name: Create temp dir for GitHub release tools
      ansible.builtin.tempfile:
        state: directory
        prefix: "gh_tool_"
      register: gh_tmpdir
      when: gh_tool_stat.results | selectattr('stat.exists', 'equalto', false) | list | length > 0
      tags: tools

    - name: Download and extract GitHub release tools
      ansible.builtin.unarchive:
        src: "https://github.com/{{ item.item.repo }}/releases/download/{{ item.item.tag_prefix | default('v') }}{{ item.item.version }}/{{ item.item.tarball }}"
        dest: "{{ gh_tmpdir.path | default('/tmp') }}"
        remote_src: true
      loop: "{{ gh_tool_stat.results }}"
      when: not item.stat.exists and gh_tmpdir is not skipped
      tags: tools

    - name: Install GitHub release binaries
      ansible.builtin.shell:
        cmd: "find {{ gh_tmpdir.path | default('/tmp') }} -name {{ item.item.binary }} -type f -exec cp {} {{ local_bin }}/{{ item.item.binary }} \\; && chmod 755 {{ local_bin }}/{{ item.item.binary }}"
      loop: "{{ gh_tool_stat.results }}"
      when: not item.stat.exists and gh_tmpdir is not skipped
      changed_when: false
      tags: tools

    - name: Clean up temp dir
      ansible.builtin.file:
        path: "{{ gh_tmpdir.path | default(omit) }}"
        state: absent
      when: gh_tmpdir is not skipped
      tags: tools

    # ── bat ────────────────────────────────────────────────────────────────────
    # Debian/Ubuntu ships bat as batcat; symlink it to the expected name

    - name: Symlink batcat → bat
      ansible.builtin.file:
        src: /usr/bin/batcat
        dest: "{{ local_bin }}/bat"
        state: link
        force: false
      when: ansible_pkg_mgr == "apt"
      tags: tools

    # ── Kitty ──────────────────────────────────────────────────────────────────

    - name: Check if kitty is installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.local/kitty.app/bin/kitty"
      register: kitty_stat
      tags: tools

    - name: Install kitty
      ansible.builtin.shell:
        cmd: "curl -L {{ kitty_install_url }} | sh /dev/stdin launch=n"
      when: not kitty_stat.stat.exists
      tags: tools

    # ── NVM ────────────────────────────────────────────────────────────────────

    - name: Check if nvm is installed
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
      register: nvm_stat
      tags: tools

    - name: Install nvm
      ansible.builtin.shell:
        cmd: >
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      when: not nvm_stat.stat.exists
      tags: tools

    # ── Neovim (from source) ──────────────────────────────────────────────────

    - name: Clone neovim
      ansible.builtin.git:
        repo: "{{ neovim_repo }}"
        dest: "{{ neovim_src }}"
        version: "{{ neovim_version }}"
        depth: 1
      register: nvim_clone
      tags: neovim

    - name: Build and install neovim
      ansible.builtin.shell:
        cmd: "make CMAKE_BUILD_TYPE=Release CMAKE_INSTALL_PREFIX={{ neovim_prefix }} install"
        chdir: "{{ neovim_src }}"
      when: nvim_clone.changed
      tags: neovim

    - name: Neovim installed
      ansible.builtin.debug:
        msg: "Neovim {{ neovim_version }} installed to {{ neovim_prefix }}/bin/nvim. Set NVIM_LOCAL_DIR to sync config to local disk on pull."
      when: nvim_clone.changed
      tags: neovim

    # ── Dotfile symlinks ───────────────────────────────────────────────────────

    - name: Ensure config directories exist
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/{{ item.dest | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ symlinks }}"
      when: (item.dest | dirname) != ""
      tags: dotfiles

    - name: Symlink dotfiles
      ansible.builtin.file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
        state: link
        force: true
        follow: false
      loop: "{{ symlinks }}"
      tags: dotfiles

    - name: Ensure scripts are executable
      ansible.builtin.file:
        path: "{{ dotfiles_dir }}/{{ item.src }}"
        mode: "0755"
      loop: "{{ symlinks }}"
      when: item.dest is search("bin/")
      tags: dotfiles

    # ── Git hooks (local only, never committed) ────────────────────────────────

    - name: Install dotfiles post-merge hook
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          if [[ -n "$NVIM_LOCAL_DIR" && -d "$NVIM_LOCAL_DIR" ]]; then
              rsync -a --delete \
                  "$(git rev-parse --show-toplevel)/nvim/.config/nvim/" \
                  "$NVIM_LOCAL_DIR/"
          fi

          if [[ -n "$NVIM_LOCAL_INSTALL" && -d "$NVIM_LOCAL_INSTALL" && -x "$HOME/.local/bin/nvim" ]]; then
              rsync -a --delete "$HOME/.local/bin/nvim" "$NVIM_LOCAL_INSTALL/bin/"
              rsync -a --delete "$HOME/.local/lib64/nvim/" "$NVIM_LOCAL_INSTALL/lib64/nvim/"
              rsync -a --delete "$HOME/.local/share/nvim/runtime/" "$NVIM_LOCAL_INSTALL/share/nvim/runtime/"
          fi
        dest: "{{ dotfiles_dir }}/.git/hooks/post-merge"
        mode: "0755"
      tags: dotfiles
