---
dotfiles_dir: "{{ lookup('env', 'HOME') }}/dotfiles"
local_bin: "{{ ansible_env.HOME }}/.local/bin"

# ── System packages (distro-maintained, need sudo) ─────────────────────────
# Base tools where the repo version is fine.

apt_packages:
  - git
  - curl
  - wget
  - gnupg
  - gcc
  - g++
  - make
  - python3
  - python3-pip

brew_packages:
  - git
  - curl
  - wget
  - gnupg
  - gcc
  - make
  - python3

# ── User tools (GitHub releases -> ~/.local/bin, no sudo) ──────────────────
# Same version everywhere. Update version here to upgrade.
# tag_prefix defaults to "v" in the playbook; set to "" for repos that don't use it.

github_releases:
  - name: zoxide
    repo: ajeetdsouza/zoxide
    version: "0.9.2"
    tarball: "zoxide-0.9.2-x86_64-unknown-linux-musl.tar.gz"
    binary: zoxide

  - name: zellij
    repo: zellij-org/zellij
    version: "0.41.2"
    tarball: "zellij-x86_64-unknown-linux-musl.tar.gz"
    binary: zellij

  - name: ripgrep
    repo: BurntSushi/ripgrep
    version: "14.1.1"
    tag_prefix: ""
    tarball: "ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz"
    binary: rg

  - name: fzf
    repo: junegunn/fzf
    version: "0.60.3"
    tarball: "fzf-0.60.3-linux_amd64.tar.gz"
    binary: fzf

# kitty: installed via official binary installer (apt version is too old)
kitty_install_url: "https://sw.kovidgoyal.net/kitty/installer.sh"

# pip packages (installed for the current user)
pip_packages:
  - grip

# ── Dotfile symlinks ───────────────────────────────────────────────────────
# src (relative to dotfiles_dir) -> dest (relative to $HOME)

symlinks:
  - src: bash/.bashrc.user
    dest: .bashrc
  - src: kitty/kitty.conf
    dest: .config/kitty/kitty.conf
  - src: zellij/config.kdl
    dest: .config/zellij/config.kdl
  - src: zellij/layouts
    dest: .config/zellij/layouts
  - src: scripts/hgg.sh
    dest: .local/bin/hgg
  - src: scripts/logbook.py
    dest: .local/bin/logbook
  - src: scripts/reg.py
    dest: .local/bin/reg
