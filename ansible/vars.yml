---
dotfiles_dir: "{{ lookup('env', 'HOME') }}/dotfiles"
local_bin: "{{ ansible_env.HOME }}/.local/bin"

# ── System packages (distro-maintained, need sudo) ─────────────────────────
# Base tools where the repo version is fine.
# Only apt and brew are handled here. RHEL/dnf is intentionally excluded
# because RHEL is only used at work, where packages come from the module
# system (module add ...) and are managed separately in work.sh.

apt_packages:
  - git
  - curl
  - wget
  - gnupg
  - gcc
  - g++
  - make
  - python3
  - python3-pip
  - python3-venv
  - ninja-build
  - gettext
  - cmake
  - bat

brew_packages:
  - git
  - curl
  - wget
  - gnupg
  - gcc
  - make
  - python3
  - cmake
  - ninja
  - gettext

# ── User tools (GitHub releases -> ~/.local/bin, no sudo) ──────────────────
# Same version everywhere. Update version here to upgrade.
# tag_prefix defaults to "v" in the playbook; set to "" for repos that don't use it.

github_releases:
  - name: zoxide
    repo: ajeetdsouza/zoxide
    version: "0.9.2"
    tarball: "zoxide-0.9.2-x86_64-unknown-linux-musl.tar.gz"
    binary: zoxide

  - name: zellij
    repo: zellij-org/zellij
    version: "0.41.2"
    tarball: "zellij-x86_64-unknown-linux-musl.tar.gz"
    binary: zellij

  - name: ripgrep
    repo: BurntSushi/ripgrep
    version: "14.1.1"
    tag_prefix: ""
    tarball: "ripgrep-14.1.1-x86_64-unknown-linux-musl.tar.gz"
    binary: rg

  - name: fzf
    repo: junegunn/fzf
    version: "0.60.3"
    tarball: "fzf-0.60.3-linux_amd64.tar.gz"
    binary: fzf

  - name: fd
    repo: sharkdp/fd
    version: "10.2.0"
    tarball: "fd-v10.2.0-x86_64-unknown-linux-musl.tar.gz"
    binary: fd

  - name: bat
    repo: sharkdp/bat
    version: "0.24.0"
    tarball: "bat-v0.24.0-x86_64-unknown-linux-musl.tar.gz"
    binary: bat

# kitty: installed via official binary installer (apt version is too old)
kitty_install_url: "https://sw.kovidgoyal.net/kitty/installer.sh"

# ── Neovim (built from source) ─────────────────────────────────────────────
# Tracks nightly. Update neovim_version to pin a specific commit/tag.
# Build deps (cmake, ninja, gettext) are in the apt/brew lists above.
neovim_repo: "https://github.com/neovim/neovim.git"
neovim_version: "nightly"
neovim_src: "{{ ansible_env.HOME }}/.local/src/neovim"
neovim_prefix: "{{ ansible_env.HOME }}/.local"

# pip packages (installed with --user for the current user)
# NOTE: pip --user is deprecated on Python 3.11+ (PEP 668). If this breaks
# on newer distros, switch to pipx or add --break-system-packages.

# ── Dotfile symlinks ───────────────────────────────────────────────────────
# src (relative to dotfiles_dir) -> dest (relative to $HOME)

symlinks:
  - src: bash/.bashrc.user
    dest: .bashrc.user
  - src: bash/.bashrc.d/aliases.sh
    dest: .bashrc.d/aliases.sh
  - src: bash/.bashrc.d/config.sh
    dest: .bashrc.d/config.sh
  - src: bash/.bashrc.d/functions.sh
    dest: .bashrc.d/functions.sh
  - src: bash/.bashrc.d/prompt.sh
    dest: .bashrc.d/prompt.sh
  - src: kitty/kitty.conf
    dest: .config/kitty/kitty.conf
  - src: kitty/current-theme.conf
    dest: .config/kitty/current-theme.conf
  - src: nvim/.config/nvim
    dest: .config/nvim
  - src: zellij/config.kdl
    dest: .config/zellij/config.kdl
  - src: zellij/layouts
    dest: .config/zellij/layouts
  - src: scripts/hgg.sh
    dest: .local/bin/hgg
  - src: scripts/logbook.py
    dest: .local/bin/logbook
  - src: scripts/reg.py
    dest: .local/bin/reg
