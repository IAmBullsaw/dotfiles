font_family      FiraCode
bold_font        FiraCode Bold
italic_font      auto
bold_italic_font auto
font_size 10.0
cursor_shape block
enable_audio_bell no
remember_window_size  yes

# Remote control (enables kitty @ commands from child processes)
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

background_opacity 0.85

# Nerd Fonts v3.2.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

tab_title_template "{index}: {title}"

# Theme
include current-theme.conf

map ctrl+alt+o launch --type=overlay --cwd=current
enabled_layouts splits,stack

# Window borders: always show active window with a colored frame
window_border_width 2px
draw_minimal_borders no
draw_window_borders_for_single_window yes
active_border_color #00ff7f
inactive_border_color #313244

# OS-level window navigation (kitty splits)
map alt+h kitten kittens/smart_nav.py left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l kitten kittens/smart_nav.py right

# Modal keyboard: ctrl+space enters kitty mode
map --new-mode kitty_mode --on-unknown passthrough ctrl+space
map ctrl+space combine : remote_control set-colors --all "active_border_color=#e06c75" : push_keyboard_mode kitty_mode

map --mode=kitty_mode h kitten kittens/smart_nav.py left
map --mode=kitty_mode l kitten kittens/smart_nav.py right
map --mode=kitty_mode j neighboring_window down
map --mode=kitty_mode k neighboring_window up
map --mode=kitty_mode t new_tab
map --mode=kitty_mode r combine : remote_control set-colors --all "active_border_color=#00ff7f" : pop_keyboard_mode : set_tab_title
map --mode=kitty_mode K launch --tab-title kiro --type tab bash -c 'kiro-cli chat'
map --mode=kitty_mode 1 goto_tab 1
map --mode=kitty_mode 2 goto_tab 2
map --mode=kitty_mode 3 goto_tab 3
map --mode=kitty_mode 4 goto_tab 4
map --mode=kitty_mode q close_window
map --mode=kitty_mode n next_tab
map --mode=kitty_mode p previous_tab
map --mode=kitty_mode escape combine : remote_control set-colors --all "active_border_color=#00ff7f" : pop_keyboard_mode
map --mode=kitty_mode ctrl+space combine : remote_control set-colors --all "active_border_color=#00ff7f" : pop_keyboard_mode
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l
startup_session ~/.config/work/kitty-session.conf